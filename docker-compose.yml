version: '3'

services:
  app:
    image: ghcr.io/aurora-develop/aurora:latest
    container_name: aurora
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - ./access_tokens.txt:/access_tokens.txt:ro
      # - ./free_tokens.txt:/free_tokens.txt:ro
      # - ./proxies.txt:/proxies.txt:ro